server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA: serve files if present, otherwise fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API proxy -> Query Service. The trailing slash on proxy_pass strips the
    # "/api/" prefix, so /api/services -> http://query:8080/services.
    # Browser only ever talks to this origin, so there is no CORS at all.
    location /api/ {
        proxy_pass http://query:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # X-Tenant-API-Key and other client headers pass through automatically.
        proxy_read_timeout 30s;
    }
}
