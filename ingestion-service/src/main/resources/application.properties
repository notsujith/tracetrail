# ===== app identity =====
spring.application.name=ingestion-service
server.port=4318

# ===== MySQL datasource =====
# env vars injected by docker-compose; defaults for local non-docker run
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:tracetrail}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&rewriteBatchedStatements=true
spring.datasource.username=${MYSQL_USER:tt}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ===== Redis =====
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8

# ===== request body size (Section 16: 10 MB cap) =====
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.max-file-size=10MB
server.tomcat.max-http-form-post-size=10MB
server.max-http-request-header-size=16KB

# ===== TraceTrail business config =====
tracetrail.retention-days=${TRACETRAIL_RETENTION_DAYS:30}
tracetrail.rate-limit.capacity=${INGESTION_RATE_LIMIT_CAPACITY:200}
tracetrail.rate-limit.refill-per-sec=${INGESTION_RATE_LIMIT_REFILL_PER_SEC:50}
tracetrail.admin-token=${ADMIN_TOKEN:change-me}

# ===== Caffeine cache (tenant-by-key, 60s TTL per Section 12) =====
spring.cache.type=caffeine
spring.cache.cache-names=tenant-by-key
spring.cache.caffeine.spec=maximumSize=10000,expireAfterWrite=60s

# ===== actuator =====
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.server.port=8081

# ===== logging =====
logging.level.root=INFO
logging.level.com.tracetrail=INFO
logging.level.org.hibernate.SQL=WARN
# flip to DEBUG temporarily to verify batch inserts working

